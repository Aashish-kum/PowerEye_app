<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerEye – Dashboard</title>
  <link rel="icon" type="image/jpg" href="/assets/favicon.png">
  <!-- <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"> -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Syne:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- PROGRESS BAR -->
  <div id="progressBar"></div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast">
    <div class="toast-dot"></div>
    <span>Data refreshed</span>
    <span class="toast-time" id="toastTime"></span>
  </div>

  <!-- ══════════════════════════════════════
       NAVIGATION
       ══════════════════════════════════════ -->
  <nav>
    <div class="nav-left">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00c8ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
      <div class="nav-title">PowerEye</div>
      <div class="nav-divider"></div>
      <div class="nav-subtitle" id="employee-id"></div>
    </div>

    <div class="nav-right">
      <div class="live-badge">
        <div class="live-dot"></div>
        <span>LIVE</span>
      </div>
      <div class="clock" id="clock">--:--:--</div>
      
      <div class="nav-buttons">
        <!-- REFRESH BUTTON -->
        <button 
          id="refreshBtn" 
          class="btn-nav" 
          onclick="refreshData()"
          title="Refresh data"
          aria-label="Refresh data"
        >
          <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36M20.49 15a9 9 0 0 1-14.85 3.36"></path>
          </svg>
          <span>Refresh</span>
        </button>

        <!-- LOGOUT BUTTON -->
        <button 
          id="logoutBtn" 
          class="btn-nav" 
          onclick="logout()"
          title="Logout"
          aria-label="Logout"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </nav>
</body>
</html>
